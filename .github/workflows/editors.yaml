---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Editors

on:
  pull_request:
    branches:
      - main
    paths:
      - editors/**
      - .github/workflows/editors.yaml
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vscode:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    permissions:
      contents: write # upload the .vsix to the release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          # Disable caching: this job uploads a release artifact, so a cache
          # poisoned from a fork PR could influence the published .vsix.
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --out yamlls.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yamlls-vsix
          path: editors/vscode/yamlls.vsix
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" yamlls.vsix --clobber --repo "$GITHUB_REPOSITORY"

  zed:
    name: Build Zed Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/zed
    permissions:
      contents: write # upload the .wasm to the release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Add wasm target
        run: rustup target add wasm32-wasip1

      - name: Build
        run: cargo build --release --locked --target wasm32-wasip1

      - name: Stage wasm
        run: cp target/wasm32-wasip1/release/zed_yamlls.wasm zed-yamlls.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zed-yamlls-wasm
          path: editors/zed/zed-yamlls.wasm
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" zed-yamlls.wasm --clobber --repo "$GITHUB_REPOSITORY"
